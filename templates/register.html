<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Coffee Classify</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-r from-green-400 via-blue-500 to-purple-600">
  <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">
    <h1 class="text-3xl font-bold text-center mb-6 text-gray-800">Create Account</h1>

    {% if error %}
    <p class="text-red-500 text-center mb-3">{{ error }}</p>
    {% endif %}

    <form action="/register" method="POST" class="space-y-4">
      <div>
        <label class="block text-gray-700">Username</label>
        <input type="text" name="username" required 
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>
      <div>
        <label class="block text-gray-700">Password</label>
        <input type="password" name="password" required 
               class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
      </div>
      <button type="submit" 
              class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition">
        Register
      </button>
    </form>

    <p class="mt-4 text-center text-gray-600">
      Already have an account? <a href="/" class="text-blue-500">Login here</a>
    </p>
  </div>
</body>
</html>
