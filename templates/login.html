<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AI-based Coffee Leaf Disease Detector</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-gradient-to-r from-green-400 via-blue-500 to-purple-600 px-4 py-8">
  <div class="text-center mb-8 max-w-3xl">
    <h1 class="text-2xl sm:text-3xl md:text-4xl font-bold text-white drop-shadow-lg leading-tight">
      AI-based Coffee leaf disease detector and Advisory system
    </h1>
    <p class="mt-3 text-white/90 text-sm sm:text-base drop-shadow">
      Sign in to classify coffee leaf images and view disease advisories
    </p>
  </div>

  <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Login</h2>

    {% if error %}
    <p class="text-red-500 text-center mb-3">{{ error }}</p>
    {% endif %}

    {% if success %}
    <p class="text-green-500 text-center mb-3">{{ success }}</p>
    {% endif %}

    <form action="{{ url_for('login_page') }}" method="POST" class="space-y-4">
      <div>
        <label class="block text-gray-700 font-medium">Username</label>
        <input type="text" name="username" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <div>
        <label class="block text-gray-700 font-medium">Password</label>
        <input type="password" name="password" required
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>
      <button type="submit"
              class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition font-semibold">
        Login
      </button>
    </form>

    <p class="mt-4 text-center text-gray-600">
      Don't have an account?
      <a href="{{ url_for('register') }}" class="text-green-600 hover:underline font-medium">Create one</a>
    </p>
  </div>
</body>
</html>
