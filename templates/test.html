<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Leaf Disease Detection and Classification</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-image: url('/static/images/photo.avif');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      animation: moveBg 10s infinite alternate ease-in-out;
    }
    @keyframes moveBg {
      0% { background-size: 100% auto; }
      50% { background-size: 110% auto; }
      100% { background-size: 100% auto; }
    }
  </style>
</head>

<body class="min-h-screen flex flex-col">
  <!-- Navbar -->
 <nav class="bg-[#1E3A8A] p-4 shadow-lg fixed w-full z-50">
    <div class="container mx-auto flex justify-center space-x-6">
      <a href="{{ url_for('home') }}" 
         class="font-bold px-3 py-1 rounded {% if request.endpoint == 'home' %}bg-blue-400 text-white{% else %}text-gray-200 hover:text-white{% endif %}">
        Home
      </a>
      <a href="{{ url_for('about') }}" 
         class="font-bold px-3 py-1 rounded {% if request.endpoint == 'about' %}bg-blue-400 text-white{% else %}text-gray-200 hover:text-white{% endif %}">
        About Us
      </a>
      <a href="{{ url_for('team') }}" 
         class="font-bold px-3 py-1 rounded {% if request.endpoint == 'team' %}bg-blue-400 text-white{% else %}text-gray-200 hover:text-white{% endif %}">
        Team
      </a>
      <a href="{{ url_for('contact') }}" 
         class="font-bold px-3 py-1 rounded {% if request.endpoint == 'contact' %}bg-blue-400 text-white{% else %}text-gray-200 hover:text-white{% endif %}">
        Contact Us
      </a>
      <a href="{{ url_for('logout') }}" 
         class="font-bold px-3 py-1 rounded {% if request.endpoint == 'logout' %}bg-blue-400 text-white{% else %}text-gray-200 hover:text-red-400{% endif %}">
        Logout
      </a>
    </div>
  </nav>



  <!-- Main Section -->
<div class="flex p-5 justify-center items-center flex-grow flex-col">
  
  <!-- Welcome Title -->
  <h1 class="text-3xl font-bold text-white mb-6 text-center">
    Welcome to Coffee Leaf Disease Detection and Classification
  </h1>

  <!-- Classification Card -->
  <div class="bg-white shadow-lg rounded-lg p-6 w-full max-w-md text-center">
    <h2 class="text-2xl font-semibold mb-4">Upload or Capture Coffee Leaf Image</h2>
    <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="previewImage(event)">
    <button onclick="document.getElementById('imageInput').click()" class="bg-blue-500 text-white px-4 py-2 rounded-lg mb-3 hover:bg-blue-600">Choose Image</button>
    <button onclick="captureImage()" class="bg-green-500 text-white px-4 py-2 rounded-lg mb-3 hover:bg-green-600">Take Photo</button>
    <video id="camera" class="w-full hidden" autoplay></video>
    <canvas id="canvas" class="hidden"></canvas>
    <img id="preview" class="w-full rounded-lg hidden mt-3" />
    <button onclick="classifyImage()" id="classifyBtn" class="bg-purple-500 text-white px-4 py-2 rounded-lg mt-3 hover:bg-purple-600 hidden">Classify Image</button>
    <p id="result" class="mt-4 text-lg font-semibold text-gray-700"></p>
    <button onclick="showCountermeasures()" id="counterBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg mt-3 hover:bg-red-600 hidden">View Countermeasures</button>
    <p id="countermeasures" class="mt-4 text-md font-semibold text-gray-700 hidden"></p>
  </div>
</div>



  <!-- Footer -->
  <footer class="bg-gray-800 text-white p-4 text-center">
    &copy; 2025 Coffee Classify | All rights reserved
  </footer>

  <!-- Script -->
  <script>
    const API_URL = "http://localhost:5000/predict";
    let detectedClass = "";

    // Preview uploaded image
    function previewImage(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('preview').src = e.target.result;
          document.getElementById('preview').classList.remove('hidden');
          document.getElementById('classifyBtn').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      }
    }

    // Capture image from webcam
    function captureImage() {
      const video = document.getElementById('camera');
      const canvas = document.getElementById('canvas');
      navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
        video.srcObject = stream;
        video.classList.remove('hidden');
        // Capture after 2 seconds
        setTimeout(() => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video, 0, 0);
          video.srcObject.getTracks().forEach(track => track.stop());
          video.classList.add('hidden');
          document.getElementById('preview').src = canvas.toDataURL();
          document.getElementById('preview').classList.remove('hidden');
          document.getElementById('classifyBtn').classList.remove('hidden');
        }, 2000);
      }).catch(err => {
        alert("Camera access denied or unavailable.");
        console.error(err);
      });
    }

    // Send image to backend for classification
    async function classifyImage() {
      const imgElement = document.getElementById('preview');
      document.getElementById('result').textContent = "Classifying...";
      try {
        const response = await fetch(imgElement.src);
        const blob = await response.blob();
        const formData = new FormData();
        formData.append("file", blob, "image.png");

        const res = await fetch(API_URL, { method: "POST", body: formData });
        const data = await res.json();
        detectedClass = data.class.toLowerCase();
        const confidence = (data.confidence * 100).toFixed(2);

        // Handle invalid image
        if (detectedClass === "not a coffee leaf") {
          document.getElementById('result').innerHTML =
            "<b style='color:red;'>⚠️ This image is not a coffee leaf.<br>Please upload a valid coffee leaf image.</b>";
          document.getElementById('counterBtn').classList.add('hidden');
          document.getElementById('countermeasures').classList.add('hidden');
          return;
        }

        document.getElementById('result').textContent =
          `Class: ${data.class}, Confidence: ${confidence}%`;
        document.getElementById('counterBtn').classList.remove('hidden');
      } catch (error) {
        document.getElementById('result').textContent = "Please upload a coffee leaf.";
        console.error("Classification error:", error);
      }
    }

    // Display countermeasures
    function showCountermeasures() {
      let message = "";
      const counterDiv = document.getElementById('countermeasures');

      if (detectedClass === "healthy leaves") {
        message = "✅ <b>Your coffee plant is healthy!</b><br>Maintain good agricultural practices and monitor for early signs of disease.";
      } else if (detectedClass === "leaf rust") {
        message = `
          <b>☕ Leaf Rust Detected!</b><br><br>
          <b>Symptoms:</b><br>
          Yellow-orange powdery spots on the underside of leaves<br>
• Premature leaf drop<br>

          <b>Countermeasures:</b><br>
          • Apply copper-based or systemic fungicides (e.g., triazoles, strobilurins) at early stages<br>
• Remove, prune, and safely destroy infected leaves to prevent spread<br>
• Reduce plant overcrowding to improve airflow and lower humidity<br>
• Apply balanced fertilizers (especially nitrogen and potassium) to boost plant immunity<br>
• Use rust-resistant coffee varieties where possible<br>
• Monitor frequently during wet seasons when rust spreads fastest
        `;
      } else if (detectedClass === "phoma") {
        message = `
         <b>Symptoms:</b><br>
• Dark brown to black lesions on leaf margins<br>
• Yellow halos surrounding infected spots<br>
• Premature leaf drop, especially in young plants<br>
• 
<b>Recommended Countermeasures:</b><br>
• Remove and destroy infected leaves to reduce fungal spread<br>
• Apply appropriate fungicides (e.g., copper-based or mancozeb) during early infection<br>
• Avoid excessive nitrogen to reduce plant vulnerability<br>
• Improve spacing and pruning to enhance air circulation<br>
• Ensure proper drainage and avoid overhead irrigation<br>
• Use disease-resistant varieties when available
        `;
      } else {
        counterDiv.classList.add('hidden');
        return;
      }

      counterDiv.innerHTML = message;
      counterDiv.classList.remove('hidden');
    }
  </script>
</body>
</html>
